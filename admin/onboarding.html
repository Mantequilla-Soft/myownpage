<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Look — My Own Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: #0a0e17;
            color: #f0f0f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: -40%; left: -20%;
            width: 140%; height: 180%;
            background:
                radial-gradient(ellipse at 25% 30%, rgba(232, 65, 66, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 60%, rgba(52, 152, 219, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 90%, rgba(155, 89, 182, 0.03) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        .onboarding {
            position: relative;
            z-index: 1;
            max-width: 1120px;
            margin: 0 auto;
            padding: 60px 28px 80px;
        }

        /* Header */
        .ob-header {
            text-align: center;
            margin-bottom: 56px;
            opacity: 0;
            animation: fadeUp 0.7s ease-out forwards;
        }

        .ob-greeting {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #e84142;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .ob-header h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.2;
            margin-bottom: 14px;
        }

        .ob-header h1 em {
            font-style: normal;
            color: #e84142;
        }

        .ob-header p {
            color: #5a6a7a;
            font-size: 17px;
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Template grid */
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 48px;
        }

        .template-card {
            position: relative;
            background: rgba(15, 20, 30, 0.7);
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeUp 0.5s ease-out forwards;
        }

        .template-card:nth-child(1)  { animation-delay: 0.15s; }
        .template-card:nth-child(2)  { animation-delay: 0.2s; }
        .template-card:nth-child(3)  { animation-delay: 0.25s; }
        .template-card:nth-child(4)  { animation-delay: 0.3s; }
        .template-card:nth-child(5)  { animation-delay: 0.35s; }
        .template-card:nth-child(6)  { animation-delay: 0.4s; }
        .template-card:nth-child(7)  { animation-delay: 0.45s; }
        .template-card:nth-child(8)  { animation-delay: 0.5s; }
        .template-card:nth-child(9)  { animation-delay: 0.55s; }
        .template-card:nth-child(10) { animation-delay: 0.6s; }
        .template-card:nth-child(11) { animation-delay: 0.65s; }

        .template-card:hover {
            border-color: rgba(255,255,255,0.12);
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.4);
        }

        .template-card.selected {
            border-color: #e84142;
            box-shadow: 0 0 0 1px #e84142, 0 16px 48px rgba(232, 65, 66, 0.15);
        }

        .template-card.selected .card-check {
            opacity: 1;
            transform: scale(1);
        }

        .card-check {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            background: #e84142;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.25s ease;
            z-index: 3;
        }

        .card-check svg {
            width: 14px;
            height: 14px;
        }

        /* Preview swatch — the visual identity of each template */
        .card-preview {
            height: 130px;
            position: relative;
            overflow: hidden;
        }

        .card-preview-bg {
            position: absolute;
            inset: 0;
        }

        .card-preview-icon {
            position: absolute;
            bottom: 14px;
            left: 18px;
            font-size: 32px;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
            z-index: 2;
        }

        /* Subtle mockup lines inside preview */
        .card-preview-lines {
            position: absolute;
            top: 18px;
            right: 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            opacity: 0.25;
        }

        .card-preview-lines span {
            display: block;
            height: 3px;
            border-radius: 2px;
            background: white;
        }

        .card-info {
            padding: 18px 18px 20px;
        }

        .card-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #f0f0f0;
        }

        .card-desc {
            font-size: 13px;
            color: #5a6a7a;
            line-height: 1.4;
        }

        /* Footer / CTA */
        .ob-footer {
            text-align: center;
            opacity: 0;
            animation: fadeUp 0.6s ease-out 0.7s forwards;
        }

        .btn-start {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 18px 44px;
            background: linear-gradient(135deg, #e84142, #c0392b);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(232, 65, 66, 0.35);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        .btn-start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-start .arrow {
            transition: transform 0.2s;
        }

        .btn-start:hover .arrow {
            transform: translateX(3px);
        }

        .btn-skip {
            display: block;
            margin: 20px auto 0;
            background: none;
            border: none;
            color: #4a5a6a;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            padding: 8px 16px;
            transition: color 0.2s;
        }

        .btn-skip:hover {
            color: #8a95a5;
        }

        /* Loading state */
        .btn-start.loading {
            pointer-events: none;
        }

        .btn-start.loading .btn-label { display: none; }
        .btn-start.loading .arrow { display: none; }
        .btn-start.loading .spinner { display: block; }

        .btn-start .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .onboarding { padding: 40px 16px 60px; }
            .ob-header h1 { font-size: 30px; }
            .ob-header p { font-size: 15px; }
            .template-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
            .card-preview { height: 100px; }
            .card-info { padding: 14px; }
            .card-name { font-size: 14px; }
            .card-desc { font-size: 12px; }
            .btn-start { padding: 16px 32px; font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="onboarding">
        <div class="ob-header">
            <div class="ob-greeting" id="greeting">Welcome aboard</div>
            <h1>Pick a look for <em>your site</em></h1>
            <p>Choose a starting template for your homepage. You can customize everything later in the builder.</p>
        </div>

        <div class="template-grid" id="templateGrid">
            <!-- Populated by JS -->
        </div>

        <div class="ob-footer">
            <button class="btn-start" id="btnStart" onclick="applyTemplate()">
                <span class="btn-label">Build My Site</span>
                <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                <div class="spinner"></div>
            </button>
            <button class="btn-skip" onclick="skipOnboarding()">Skip — use a blank page</button>
        </div>
    </div>

    <script>
        var selectedTemplate = 'blogger';
        var username = '';

        // Template visual configs — colors and patterns for the preview swatches
        var templateVisuals = {
            'blank':          { bg: 'linear-gradient(135deg, #1e293b, #0f172a)',      icon: '📄' },
            'blogger':        { bg: 'linear-gradient(135deg, #0f0c29, #302b63)',       icon: '✍️' },
            'portfolio':      { bg: 'linear-gradient(135deg, #0a0a0a, #1a1a2e)',       icon: '🎨' },
            'musician':       { bg: 'linear-gradient(180deg, #0d0d0d, #1a0a2e)',       icon: '🎵' },
            'vlogger':        { bg: 'linear-gradient(135deg, #0f0f0f, #1a1a2e)',       icon: '🎬' },
            'photographer':   { bg: 'linear-gradient(135deg, #f5f3f0, #e8e4de)',       icon: '📷' },
            'small-business': { bg: 'linear-gradient(135deg, #1a1a2e, #2d3748)',       icon: '🏪' },
            'personal-cv':    { bg: 'linear-gradient(135deg, #ffffff, #f0f0f0)',        icon: '📋' },
            'restaurant':     { bg: 'linear-gradient(135deg, #1a1209, #2a1f0d)',        icon: '🍽️' },
            'community-dao':  { bg: 'linear-gradient(135deg, #0a1a0a, #0d2818)',        icon: '🏛️' },
            'link-in-bio':    { bg: 'linear-gradient(135deg, #1a0a2e, #2d1b4e)',        icon: '🔗' },
        };

        window.addEventListener('DOMContentLoaded', async function() {
            // Fetch user info
            try {
                var resp = await fetch('/admin/api/me');
                if (resp.ok) {
                    var user = await resp.json();
                    username = user.username;
                    document.getElementById('greeting').textContent = 'Welcome, @' + username;
                }
            } catch(e) {}

            // Fetch templates
            try {
                var resp = await fetch('/admin/api/templates');
                var data = await resp.json();
                renderTemplates(data.templates);
            } catch(e) {
                console.error('Error loading templates:', e);
            }
        });

        function renderTemplates(templates) {
            var grid = document.getElementById('templateGrid');
            grid.innerHTML = templates.map(function(t) {
                var vis = templateVisuals[t.id] || { bg: 'linear-gradient(135deg, #1a1a2e, #2d3748)', icon: t.icon };
                var isSelected = t.id === selectedTemplate;

                return '<div class="template-card' + (isSelected ? ' selected' : '') + '" data-id="' + t.id + '" onclick="selectTemplate(this, \'' + t.id + '\')">'
                    + '<div class="card-check"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'
                    + '<div class="card-preview">'
                    + '  <div class="card-preview-bg" style="background:' + vis.bg + ';"></div>'
                    + '  <div class="card-preview-icon">' + vis.icon + '</div>'
                    + '  <div class="card-preview-lines">'
                    + '    <span style="width:48px;"></span>'
                    + '    <span style="width:36px;"></span>'
                    + '    <span style="width:52px;"></span>'
                    + '  </div>'
                    + '</div>'
                    + '<div class="card-info">'
                    + '  <div class="card-name">' + t.name + '</div>'
                    + '  <div class="card-desc">' + t.description + '</div>'
                    + '</div>'
                    + '</div>';
            }).join('');
        }

        function selectTemplate(el, id) {
            document.querySelectorAll('.template-card').forEach(function(c) {
                c.classList.remove('selected');
            });
            el.classList.add('selected');
            selectedTemplate = id;
        }

        async function applyTemplate() {
            var btn = document.getElementById('btnStart');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                var resp = await fetch('/admin/api/apply-homepage-template', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ template: selectedTemplate })
                });

                if (resp.ok) {
                    window.location.href = '/admin/dashboard';
                } else {
                    var data = await resp.json();
                    alert(data.error || 'Something went wrong. Please try again.');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                }
            } catch(e) {
                alert('Connection error. Please try again.');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        function skipOnboarding() {
            window.location.href = '/admin/dashboard';
        }
    </script>
</body>
</html>
